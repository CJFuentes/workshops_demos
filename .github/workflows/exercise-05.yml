name: Exercise 05 — CI

on:
  push:
    branches: [main]
    paths:
      - 'exercise-05-broken-skill/**'
  pull_request:
    branches: [main]
    paths:
      - 'exercise-05-broken-skill/**'

defaults:
  run:
    working-directory: exercise-05-broken-skill

jobs:
  ci:
    name: Lint · Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: exercise-05-broken-skill/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Tests
        run: npm test
